# Render Blueprint (optional). Configure via dashboard if preferred.
# Root directory for backend service: backend
services:
  - type: web
    name: putting-performance-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: CORS_ORIGINS
        sync: false  # Set manually to your Vercel URL(s), e.g. https://your-app.vercel.app
